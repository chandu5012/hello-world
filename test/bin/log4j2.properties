status = error
name = SparkLogConfig

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

rootLogger.level = warn
rootLogger.appenderRefs = console
rootLogger.appenderRef.console.ref = console

logger.spark.name = org.apache.spark
logger.spark.level = warn

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn

logger.hive.name = org.apache.hive
logger.hive.level = warn

# Your app logs (change mismatch_explorer to your logger name)
logger.app.name = mismatch_explorer
logger.app.level = info
logger.app.additivity = false
logger.app.appenderRefs = console
logger.app.appenderRef.console.ref = console

