# ===== Root: keep frameworks quiet =====
log4j.rootCategory=WARN, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

# ===== Noisy frameworks =====
log4j.logger.org.apache.spark=WARN
log4j.logger.org.sparkproject=WARN
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.apache.hive=WARN
log4j.logger.org.apache.parquet=WARN
log4j.logger.org.apache.orc=WARN
log4j.logger.org.eclipse.jetty=WARN
log4j.logger.io.netty=WARN
log4j.logger.kafka=WARN
log4j.logger.org.mongodb.driver=WARN

# ===== Remove spark-shell / repl noise (you had INFO earlier) =====
log4j.logger.org.apache.spark.repl.Main=WARN
log4j.logger.org.apache.spark.repl.SparkMain$exprTyper=WARN
log4j.logger.org.apache.spark.repl.SparkILoop$SparkILoopInterpreter=WARN

# ===== YOUR APP logs (change name) =====
# If your Python logger is logging.getLogger("mismatch_explorer"), use:
log4j.logger.mismatch_explorer=INFO
log4j.additivity.mismatch_explorer=false

--conf "spark.ui.showConsoleProgress=false"
